name: C++ CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3

      - name: Configure (Ninja)
        run: cmake -G "Ninja" -S . -B build -DVERSION_PROJECT=${{ github.run_number }}

      - name: Build
        run: cmake --build build

      - name: Run
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            ./build/LAB1
          else
            ./build/LAB1.exe
          fi